<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Golgari Palace Game Day</title>
    <script>
        // GitHub Pages SPA fallback. Remember where the user was, then bounce
        // to the app root. The redirect target MUST be absolute: a relative
        // "./index.html" resolves back into deep paths (e.g.
        // /golgari-game-day/undercity/index.html) and loops forever.
        // index.html reads sessionStorage.redirect and restores the route.
        sessionStorage.redirect = location.href;
        location.replace('/golgari-game-day/');
    </script>
    <!-- Fallback if JS is disabled. -->
    <meta http-equiv="refresh" content="0;URL='/golgari-game-day/'">
</head>
<body>
    <p>Redirecting…</p>
</body>
</html>
