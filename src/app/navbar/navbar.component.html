<mat-toolbar color="primary" class="navbar">
  <!-- The logo is the secret door: it leads down into The Undercity sub-game. -->
  <a routerLink="/undercity" class="brand" aria-label="Golgari Palace Game Day — enter The Undercity">
    <span class="brand-logo" aria-hidden="true"></span>
    <span class="title">Golgari Palace Game Day</span>
  </a>
  <span class="spacer"></span>
  
  <div class="nav-links">
    <a mat-button routerLink="/home" routerLinkActive="active" class="nav-link">
      <mat-icon>casino</mat-icon>
      <span class="nav-text">Games</span>
    </a>
    <a mat-button routerLink="/tv" routerLinkActive="active" class="nav-link desktop-only">
      <mat-icon>qr_code_2</mat-icon>
      <span class="nav-text">TV</span>
    </a>
    @if (isDev) {
      <a
        mat-button
        routerLink="/undercity/color-test"
        routerLinkActive="active"
        class="nav-link"
        title="Undercity sprite recolor sandbox (dev only)"
      >
        <mat-icon>palette</mat-icon>
        <span class="nav-text">Color Test</span>
      </a>
    }

    @if (userService.isSignedIn()) {
      @if (isDev) {
        <button
          type="button"
          class="user-chip user-chip-button"
          [matMenuTriggerFor]="userMenu"
          [attr.title]="userService.username()"
          aria-label="Open user menu"
        >
          <mat-icon>person</mat-icon>
          <span class="user-name">{{ userService.username() }}</span>
          <mat-icon class="caret">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu" xPosition="before">
          <button mat-menu-item (click)="rename()">
            <mat-icon>edit</mat-icon>
            <span>Rename</span>
          </button>
          <button mat-menu-item (click)="signOut()">
            <mat-icon>logout</mat-icon>
            <span>Sign out</span>
          </button>
        </mat-menu>
      } @else {
        <span class="user-chip" [attr.title]="userService.username()">
          <mat-icon>person</mat-icon>
          <span class="user-name">{{ userService.username() }}</span>
        </span>
      }
    } @else {
      <button mat-button class="nav-link sign-in-button" (click)="openSignIn()">
        <mat-icon>person_outline</mat-icon>
        <span class="nav-text">Sign in</span>
      </button>
    }
  </div>
</mat-toolbar>

<div class="content">
  <ng-content></ng-content>
</div>
