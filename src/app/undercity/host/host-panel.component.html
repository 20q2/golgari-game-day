<div class="host-panel">
  <button class="host-toggle" (click)="open.set(!open())">
    <mat-icon class="mi">vpn_key</mat-icon> Host controls
    <mat-icon class="mi">{{ open() ? 'expand_more' : 'chevron_right' }}</mat-icon>
  </button>
  @if (open()) {
    <div class="host-body">
      <input
        class="host-input"
        type="password"
        placeholder="Host passphrase"
        [(ngModel)]="hostKey"
        autocomplete="off"
      />
      <div class="host-actions">
        @if (!seasonActive()) {
          <button
            class="uc-btn uc-btn-primary"
            [disabled]="busy() || !hostKey.trim()"
            (click)="startNight()"
          >
            <mat-icon class="mi">dark_mode</mat-icon> New Night
          </button>
        } @else {
          <button
            class="uc-btn uc-btn-danger"
            [disabled]="busy() || !hostKey.trim()"
            (click)="endNight()"
          >
            <mat-icon class="mi">{{ confirmEnd() ? 'warning' : 'sports_score' }}</mat-icon>
            {{ confirmEnd() ? 'Really end the night?' : 'End Night' }}
          </button>
          <button
            class="uc-btn uc-btn-primary"
            [disabled]="busy() || !hostKey.trim()"
            (click)="startNight()"
          >
            <mat-icon class="mi">dark_mode</mat-icon> New Night (archives current)
          </button>
        }
      </div>
      @if (message(); as msg) {
        <p class="host-msg">{{ msg }}</p>
      }
      <p class="host-note">
        First "New Night" ever sets the passphrase. The Behemoth slumbers in this build.
      </p>
    </div>
  }
</div>
