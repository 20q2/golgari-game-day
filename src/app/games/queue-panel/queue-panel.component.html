<section class="queue-panel" *ngIf="queue.isNightActive() && queue.entries().length > 0">
  <div class="queue-panel-header">
    <mat-icon class="queue-icon">casino</mat-icon>
    <span class="queue-title">Tonight's Queue</span>
  </div>

  <ul class="queue-cards" role="list">
    <li
      *ngFor="let entry of queue.entries()"
      class="queue-card"
      [class.ready]="isReady(entry.gameId)"
    >
      <div class="queue-card-thumb">
        <img
          *ngIf="imageFor(entry.gameId) as img"
          class="thumb-img"
          [src]="img"
          [alt]="entry.gameTitle"
          loading="lazy"
        />
        <span class="queue-card-title">{{ entry.gameTitle }}</span>
      </div>

      <div class="queue-card-body">
        <div class="seat-row">
          <mat-icon
            *ngFor="let seat of seats(entry.gameId)"
            class="seat"
            [class.filled]="seat.filled"
            [class.optional]="!seat.required"
            [class.min-edge]="seat.minEdge"
          >{{ seat.filled ? 'person' : 'person_outline' }}</mat-icon>
        </div>

        <div class="seat-status" [class.ready]="isReady(entry.gameId)">
          <ng-container *ngIf="isReady(entry.gameId); else needMore">
            <mat-icon class="status-icon">check_circle</mat-icon>
            Ready to play
          </ng-container>
          <ng-template #needMore>
            {{ needed(entry.gameId) }} more to start
          </ng-template>
        </div>

        <div class="lobby-names" *ngIf="memberNames(entry.gameId) as names">{{ names }}</div>

        <button
          type="button"
          class="queue-join-btn"
          [class.joined]="queue.isJoined(entry.gameId)"
          (click)="toggle(entry.gameId, entry.gameTitle)"
        >
          {{ queue.isJoined(entry.gameId) ? 'Leave' : 'Join' }}
        </button>
      </div>
    </li>
  </ul>

  <p class="queue-error" *ngIf="queue.error() as err">{{ err }}</p>
</section>
