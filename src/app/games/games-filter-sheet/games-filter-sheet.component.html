<div class="sheet">
  <header class="sheet-header">
    <h3>Filters</h3>
    <button type="button" class="header-clear" (click)="clearAll()">Clear all</button>
    <button type="button" class="close" (click)="cancel()" aria-label="Close filters">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <section class="row">
    <label class="row-label">
      <mat-icon>schedule</mat-icon>
      <span>Duration</span>
    </label>
    <div class="value-grid">
      <button
        type="button"
        class="value-chip"
        [class.selected]="filter.duration == null"
        (click)="selectDuration(undefined)"
      >
        Any
      </button>
      <button
        *ngFor="let d of durationOptions"
        type="button"
        class="value-chip"
        [class.selected]="filter.duration === d.value"
        (click)="selectDuration(d.value)"
      >
        {{ d.label }}
      </button>
    </div>
  </section>

  <section class="row">
    <label class="row-label">
      <mat-icon>group</mat-icon>
      <span>Players</span>
    </label>
    <div class="value-grid">
      <button
        type="button"
        class="value-chip"
        [class.selected]="filter.supportedPlayers == null"
        (click)="selectPlayers(undefined)"
      >
        Any
      </button>
      <button
        *ngFor="let p of playerOptions"
        type="button"
        class="value-chip"
        [class.selected]="filter.supportedPlayers === p.value"
        (click)="selectPlayers(p.value)"
      >
        {{ p.label }}
      </button>
    </div>
  </section>

  <section class="row">
    <label class="row-label">
      <mat-icon>category</mat-icon>
      <span>Genres</span>
    </label>
    <div class="genre-grid">
      <button
        *ngFor="let g of genreCounts"
        type="button"
        class="genre-chip"
        [class.selected]="isSelected(g.genre)"
        (click)="toggleGenre(g.genre)"
      >
        <mat-icon class="chip-icon">{{ iconService.iconFor(g.genre) }}</mat-icon>
        <span class="chip-label">{{ g.genre }}</span>
        <span class="count">{{ g.count }}</span>
      </button>
    </div>
  </section>

</div>
