<ul class="games-list" role="list">
  <li
    *ngFor="let g of games; trackBy: trackById"
    class="games-list-item"
    (click)="open.emit(g)"
    (keydown.enter)="open.emit(g)"
    (keydown.space)="$event.preventDefault(); open.emit(g)"
    tabindex="0"
    role="button"
    [attr.aria-label]="'Open ' + g.title + ' details'"
  >
    <img
      *ngIf="g.imageUrl"
      class="thumb"
      [src]="g.imageUrl"
      [alt]="g.title"
      loading="lazy"
    />

    <div class="primary">
      <div class="title">{{ g.title }}</div>
      <div class="genres">
        <span *ngFor="let genre of topGenres(g)" class="genre-pill">
          <mat-icon class="pill-icon">{{ iconService.iconFor(genre) }}</mat-icon>
          <span class="pill-label">{{ genre }}</span>
        </span>
        <span *ngIf="extraGenresCount(g) > 0" class="genre-pill more">
          +{{ extraGenresCount(g) }}
        </span>
      </div>
      <div class="players">
        <span class="genre-pill">
          <mat-icon class="pill-icon">group</mat-icon>
          <span class="pill-label">{{ playerLabel(g) }}</span>
        </span>
      </div>
    </div>

    <div class="social" *ngIf="likes(g) || comments(g)">
      <span *ngIf="likes(g)" class="social-item heart">
        <mat-icon class="social-icon">favorite</mat-icon>{{ likes(g) }}
      </span>
      <span *ngIf="comments(g)" class="social-item">
        <mat-icon class="social-icon">mode_comment</mat-icon>{{ comments(g) }}
      </span>
    </div>

    <div class="trailing">
      <div class="rating" *ngIf="g.bggRating">★ {{ g.bggRating }}</div>
    </div>
  </li>
</ul>
